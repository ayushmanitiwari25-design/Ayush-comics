<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayush Comics</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
}

h1{
color:#ff9800;
}

.hero{
padding:60px 20px;
text-align:center;
}

.btn{
background:#ff9800;
color:white;
padding:12px 25px;
text-decoration:none;
border-radius:8px;
}

.comics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
padding:15px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

footer{
text-align:center;
padding:20px;
background:#000;
}
</style>
</head>

<body>

<header>
<h1>AYUSH COMICS</h1>
</header>

<section class="hero">
<h2>Welcome to Ayush Comics</h2>
<p>Read Amazing Comics Online</p>
<a href="#" class="btn">Read Now</a>
</section>

<section class="comics">

<div class="card">
<img src="https://picsum.photos/400/600" alt="">
<h3>Comic Chapter 1</h3>
</div>

<div class="card">
<img src="https://picsum.photos/401/600" alt="">
<h3>Comic Chapter 2</h3>
</div>

</section>

<footer>
© 2026 Ayush Comics
</footer>

</body>
</html>
